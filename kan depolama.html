<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kan Bankası Yönetim Sistemi</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:#f4f4f4;
    padding:30px;
}

.container{
    width:90%;
    max-width:1000px;
    margin:auto;
}

h1{
    text-align:center;
    color:darkred;
    margin-bottom:20px;
}

.card{
    background:white;
    padding:20px;
    border-radius:10px;
    margin-bottom:20px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input,select,button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    background:darkred;
    color:white;
    border:none;
    cursor:pointer;
}

button:hover{
    background:red;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

table th{
    background:darkred;
    color:white;
}

table th,table td{
    border:1px solid #ccc;
    padding:10px;
    text-align:center;
}

.stats{
    display:flex;
    gap:20px;
    margin-bottom:20px;
}

.box{
    flex:1;
    background:white;
    padding:20px;
    border-radius:10px;
    text-align:center;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.box h2{
    color:darkred;
}

.delete{
    background:red;
    padding:6px 10px;
    border:none;
    color:white;
    border-radius:5px;
}
</style>
</head>

<body>

<div class="container">

<h1>🩸 Kan Bankası Yönetim Sistemi</h1>

<div class="stats">
    <div class="box">
        <h2 id="toplam">0</h2>
        <p>Toplam Donör</p>
    </div>

    <div class="box">
        <h2>8</h2>
        <p>Kan Grubu</p>
    </div>
</div>

<div class="card">
    <h2>Yeni Donör Ekle</h2>

    <input type="text" id="ad" placeholder="Ad Soyad">

    <input type="number" id="yas" placeholder="Yaş">

    <select id="kan">
        <option>A+</option>
        <option>A-</option>
        <option>B+</option>
        <option>B-</option>
        <option>AB+</option>
        <option>AB-</option>
        <option>0+</option>
        <option>0-</option>
    </select>

    <input type="text" id="telefon" placeholder="Telefon">

    <button onclick="ekle()">Donör Ekle</button>
</div>

<div class="card">

<h2>Donör Listesi</h2>

<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>Ad Soyad</th>
            <th>Yaş</th>
            <th>Kan Grubu</th>
            <th>Telefon</th>
            <th>İşlem</th>
        </tr>
    </thead>

    <tbody id="liste"></tbody>
</table>

</div>

</div>

<script>

let sayac = 0;

function ekle(){

    let ad = document.getElementById("ad").value;
    let yas = document.getElementById("yas").value;
    let kan = document.getElementById("kan").value;
    let telefon = document.getElementById("telefon").value;

    if(ad=="" || yas=="" || telefon==""){
        alert("Boş alan bırakmayın");
        return;
    }

    sayac++;

    let satir = `
    <tr>
        <td>${sayac}</td>
        <td>${ad}</td>
        <td>${yas}</td>
        <td>${kan}</td>
        <td>${telefon}</td>
        <td>
            <button class="delete" onclick="sil(this)">Sil</button>
        </td>
    </tr>
    `;

    document.getElementById("liste").innerHTML += satir;

    document.getElementById("toplam").innerText = sayac;

    document.getElementById("ad").value="";
    document.getElementById("yas").value="";
    document.getElementById("telefon").value="";
}

function sil(btn){
    btn.parentElement.parentElement.remove();

    sayac--;

    document.getElementById("toplam").innerText = sayac;
}

</script>

</body>
</html>
