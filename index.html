<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kan Bankası Yönetim Sistemi</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <nav>
            <div class="logo">🩸 KanCan</div>
            <ul>
                <li><a href="#">Anasayfa</a></li>
                <li><a href="#">Bağış Yap</a></li>
                <li><a href="#">Stok Durumu</a></li>
                <li><a href="#">İletişim</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <!-- Bağışçı Kayıt Formu -->
        <section id="registration">
            <h2>Yeni Bağışçı Kaydı</h2>
            <form action="#">
                <div class="form-group">
                    <label>Ad Soyad:</label>
                    <input type="text" placeholder="Adınızı giriniz..." required>
                </div>
                <div class="form-group">
                    <label>Kan Grubu:</label>
                    <select>
                        <option>A Rh+</option>
                        <option>A Rh-</option>
                        <option>B Rh+</option>
                        <option>B Rh-</option>
                        <option>AB Rh+</option>
                        <option>AB Rh-</option>
                        <option>0 Rh+</option>
                        <option>0 Rh-</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Telefon:</label>
                    <input type="tel" placeholder="05xx xxx xx xx">
                </div>
                <button type="submit" class="btn">Kaydet</button>
            </form>
        </section>

        <!-- Kan Stok Tablosu -->
        <section id="stock">
            <h2>Güncel Stok Durumu</h2>
            <table>
                <thead>
                    <tr>
                        <th>Kan Grubu</th>
                        <th>Stok Miktarı (Ünite)</th>
                        <th>Durum</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>A Rh+</td>
                        <td>45</td>
                        <td><span class="status high">Yeterli</span></td>
                    </tr>
                    <tr>
                        <td>0 Rh-</td>
                        <td>12</td>
                        <td><span class="status low">Kritik</span></td>
                    </tr>
                </tbody>
            </table>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Kan Bankası Yönetim Sistemi - Bir hayat kurtar.</p>
    </footer>

</body>
</html>
